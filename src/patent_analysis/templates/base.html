<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | {{ app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="backdrop"></div>
<div class="page-shell">
    <header class="topbar">
        <a href="/" class="brand">
            <span class="brand-kicker">Fuyao Demo</span>
            <strong>{{ app_name }}</strong>
        </a>
        <nav class="nav">
            <a href="/" class="{% if nav == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/patents" class="{% if nav == 'patents' %}active{% endif %}">Patents</a>
            <a href="/designs" class="{% if nav == 'designs' %}active{% endif %}">Designs</a>
            <a href="/analysis" class="{% if nav == 'analysis' %}active{% endif %}">Risk Analysis</a>
            <a href="/innovation" class="{% if nav == 'innovation' %}active{% endif %}">Innovation</a>
        </nav>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
